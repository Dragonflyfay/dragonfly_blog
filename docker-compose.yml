version: '3.8'

services:
  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: dragonfly-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - dragonfly-network

  # Kibana (可选，可视化工具)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: dragonfly-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dragonfly-network

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: dragonfly-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dragonfly-network

volumes:
  es_data:
  redis_data:

networks:
  dragonfly-network:
    driver: bridge